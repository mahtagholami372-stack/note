<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note-Keaper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="test.css">
  <link rel="stylesheet" href="all.css">
  <link rel="stylesheet" href="https://unpkg.com/persian-datepicker@1.2.0/dist/css/persian-datepicker.min.css">
  <link rel="stylesheet" href="https://unpkg.com/persian-datepicker@1.2.0/dist/css/persian-datepicker.min.css">
</head>
<body>
  <div class="flex justify-between  py-4 px-3 ">
    <i class=" searchicon fa-solid fa-magnifying-glass ml-3 mt-2"></i>
     <input type="text" placeholder="Search" class="search-input  flex-none   mr-18   text-center justify-center items-center bg-gray-border-solid-border-10   ">
  <div class="toggle ">
    <div class="circle">☀️</div>
  </div>
  </div>
  <main class=" main  flex justify-around mt-5">
    <aside class="w-96 bg-blue-50 mx-5 rounded-[10px]  ">
      <div class=" flex justify-between items-center">
        <i class=" dash   fa-solid fa-sliders"></i>
      <h2 class="dashboard  text-[#121212] font-m font-vazir">Dashboard</h2>
      </div>
      <div class="flex justify-between items-center">
        <i class=" sch fa-regular fa-calendar-check"></i>
        <h2 class="schedule">Schedule</h2>
      </div>
      <div class="  not flex justify-between items-center">
        <i class=" nt fa-regular fa-message"></i>
        <h2 class="note">Note</h2>
      </div>
      <div class=" flex justify-between items-center">
        <i class=" trash fa-solid fa-dumpster"></i>
        <h2 class="traSh">Trash</h2>
      </div>
      <nav>
        <ul>
          <li></li>
        </ul>
      </nav>
    </aside>
  <div class="total px-4">
    <div class="main-container flex flex-col items-center ">
      <div  class="today1 flex bg-linear-gradient(125deg, #98B9F2,#CAE5FF 20%) w-[300px] h-[300px] rounded-[30px] color:#1E3888 text-center justify-center font-xl">
        <h2 class="h22">Saturday</h2>
        <ul  class="list"></ul>
        <div class="plus color:white font-xl">+</div>
        <div class="open-modal bg-#1E3888 w-[50px] h-[50px] rounded-[80px] flex text-center items-center justify-center mt-[200px] ml-[95px]"></div>
      </div>

      <div class="today2 font-xl flex bg-linear-gradient(125deg, #B79CED,#DEC0F1 20%) w-[300px] h-[300px] rounded-[30px] color:#540D6E text-center justify-center">
        <h2 class="h22">Sunday</h2>
        <ul  class="list"></ul>
        <div class="plus color:white font-xl">+</div>
        <div class="open-modal bg-#1E3888 w-[50px] h-[50px] rounded-[80px] flex text-center items-center justify-center mt-[200px] ml-[95px]"></div>
      </div>
    </div>

    <div class="main-container flex flex-col items-center !gap-3">
      <div class="today1 flex bg-linear-gradient(125deg, #98B9F2,#CAE5FF 20%) w-[300px] h-[300px] rounded-[30px] color:#1E3888 text-center justify-center font-xl">
        <h2 class="h22">Monday</h2>
        <ul  class="list"></ul>
        <div class="plus color:white font-xl">+</div>
        <div class="open-modal bg-#1E3888 w-[50px] h-[50px] rounded-[80px] flex text-center items-center justify-center mt-[200px] ml-[95px]"></div>
      </div>

      <div class="today2 font-xl flex bg-linear-gradient(125deg, #B79CED,#DEC0F1 20%) w-[300px] h-[300px] rounded-[30px] color:#540D6E text-center justify-center">
        <h2 class="h22">Tuesday</h2>
        <ul  class="list"></ul>
        <div class="plus color:white font-xl">+</div>
        <div class="open-modal bg-#1E3888 w-[50px] h-[50px] rounded-[80px] flex text-center items-center justify-center mt-[200px] ml-[95px]"></div>
      </div>
    </div>

    <div class="main-container flex flex-col items-center !gap-3">
      <div class="today1 flex bg-linear-gradient(125deg, #98B9F2,#CAE5FF 20%) w-[300px] h-[300px] rounded-[30px] color:#1E3888 text-center justify-center font-xl">
        <h2 class="h22">Friday</h2>
        <ul  class="list"></ul>
        <div class="plus color:white font-xl">+</div>
        <div class="open-modal bg-#1E3888 w-[50px] h-[50px] rounded-[80px] flex text-center items-center justify-center mt-[200px] ml-[95px]"></div>
      </div>

      <div class="today3 font-xl flex rounded-[30px] justify-center text-center w-[300px] h-[300px] bg-linear-gradient(355deg, #EE4266,white 100%) color:#EE4266;">
        <h2 class="h22">Wendsday</h2>
        <ul  class="list"></ul>
        <div class="plus color:white font-xl">+</div>
        <div class="open-modal bg-#1E3888 w-[50px] h-[50px] rounded-[80px] flex text-center items-center justify-center mt-[200px] ml-[95px]"></div>
      </div>
    </div>
  </div>
  </main>


  <div id="myModal" class="modal">
    <div class="modal-content"></div>
    <button class="close-button">&times;</button>
    <div class="hame">
      <div class="input-box">
        <span>Title</span>
        <input class="result" type="text">
        <span>Date</span>
        <input class="pdate" type="text">
        <span>Clock</span>
        <input class="ptime" type="text">
        <h3 id="modal-msg"></h3>
        <p id="modal-error" style="color: red; display: none;"></p>
        <button class="sub" type="submit">ثبت</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/persian-date@1.1.0/dist/persian-date.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/persian-datepicker@1.2.0/dist/js/persian-datepicker.min.js"></script>
  <script src="all.js"></script>
  <script src="note.js"></script>
</body>
</html>
